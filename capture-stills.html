<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Still Capture</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #121416;
      color: #f4f6f7;
      font-family: Inter, Arial, sans-serif;
    }

    #captureRoot {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(124, 180, 222, 0.16), transparent 42%),
        linear-gradient(180deg, #181c20, #101315);
    }

    #viewer {
      width: 100%;
      height: 100%;
    }

    .caption {
      position: absolute;
      left: 32px;
      bottom: 28px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(10, 12, 13, 0.64);
      color: rgba(255, 255, 255, 0.84);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .actions {
      position: absolute;
      top: 28px;
      right: 28px;
      display: flex;
      gap: 10px;
    }

    button {
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(10, 12, 13, 0.72);
      color: #f4f6f7;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="captureRoot">
    <div id="viewer" aria-hidden="true"></div>
    <div class="actions">
      <button type="button" id="downloadPng" disabled>Download PNG</button>
    </div>
    <div class="caption" id="caption"></div>
  </main>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const params = new URLSearchParams(window.location.search);
    const src = params.get("src");
    const label = params.get("label") || "";
    const view = params.get("view") || "iso-a";
    const fileName = params.get("file") || "";
    const container = document.getElementById("viewer");
    const caption = document.getElementById("caption");
    const downloadPng = document.getElementById("downloadPng");

    if (!src) {
      caption.textContent = "Missing src parameter";
      throw new Error("Missing src parameter");
    }

    caption.textContent = label;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.12;
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(28, window.innerWidth / window.innerHeight, 0.01, 10000);
    const target = new THREE.Object3D();
    scene.add(target);

    scene.add(new THREE.AmbientLight(0xffffff, 0.58));
    scene.add(new THREE.HemisphereLight(0xffffff, 0x92a6b6, 1.55));

    const key = new THREE.DirectionalLight(0xffffff, 4.9);
    key.position.set(6, 9, 7);
    key.target = target;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xdcecff, 2.15);
    fill.position.set(-7, 4, -5);
    fill.target = target;
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffdfb8, 2.35);
    rim.position.set(-1, 6, -8);
    rim.target = target;
    scene.add(rim);

    const cameraLight = new THREE.DirectionalLight(0xffffff, 1.48);
    cameraLight.target = target;
    scene.add(cameraLight);

    const loader = new GLTFLoader();
    loader.load(
      src,
      (gltf) => {
        const model = gltf.scene;
        model.updateWorldMatrix(true, true);
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        let meshIndex = 0;
        const palette = [0x74b9df, 0xc3ddeb, 0x9ec7dd, 0xd7aa4f];
        model.traverse((child) => {
          if (!child.isMesh || !child.geometry) return;
          child.geometry.computeVertexNormals?.();
          const color = palette[meshIndex % palette.length];
          child.material = new THREE.MeshStandardMaterial({
            color,
            roughness: 0.7,
            metalness: 0.02,
            emissive: new THREE.Color(color).multiplyScalar(0.26),
            emissiveIntensity: 0.09,
            side: THREE.DoubleSide,
          });
          const edges = new THREE.EdgesGeometry(child.geometry, 28);
          const lines = new THREE.LineSegments(
            edges,
            new THREE.LineBasicMaterial({ color: 0x21333f, transparent: true, opacity: 0.34 }),
          );
          child.add(lines);
          meshIndex += 1;
        });

        scene.add(model);

        const size = box.getSize(new THREE.Vector3());
        const maxDimension = Math.max(size.x, size.y, size.z) || 1;
        const fovRadians = THREE.MathUtils.degToRad(camera.fov);
        const distance = Math.max(2, (maxDimension / (2 * Math.tan(fovRadians / 2))) * 1.34);
        camera.near = Math.max(0.01, maxDimension / 1000);
        camera.far = Math.max(1000, maxDimension * 80);
        camera.updateProjectionMatrix();

        const directions = {
          "iso-a": new THREE.Vector3(1, 0.72, 1),
          "iso-b": new THREE.Vector3(-1, 0.72, 1),
          "iso-c": new THREE.Vector3(1, 0.92, -1),
          "iso-d": new THREE.Vector3(-1, 0.86, -1),
        };

        const direction = (directions[view] || directions["iso-a"]).normalize();
        camera.position.copy(direction.multiplyScalar(distance));
        camera.lookAt(0, 0, 0);
        cameraLight.position.copy(camera.position);

        renderer.render(scene, camera);
        downloadPng.disabled = false;
        window.__CAPTURE_READY__ = true;
      },
      undefined,
      () => {
        caption.textContent = "Failed to load model";
      },
    );

    downloadPng.addEventListener("click", () => {
      const fileStem = fileName || (label || "model-still").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      const link = document.createElement("a");
      link.href = renderer.domElement.toDataURL("image/png");
      link.download = fileName ? `${fileStem}.png` : `${fileStem}-${view}.png`;
      link.click();
    });
  </script>
</body>
</html>
